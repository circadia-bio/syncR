<svg xmlns="http://www.w3.org/2000/svg" width="680" height="680" viewBox="0 0 680 680" role="img">
  <title>syncR hex sticker</title>
  <desc>Square hex sticker showing a pendulum mid-swing with arc trails and a detailed bob</desc>

  <defs>
    <clipPath id="hexclip">
      <polygon points="340,38 602,188 602,492 340,642 78,492 78,188"/>
    </clipPath>
    <radialGradient id="bobgrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#FFB066"/>
      <stop offset="60%"  stop-color="#FE7F2D"/>
      <stop offset="100%" stop-color="#C45A0E"/>
    </radialGradient>
    <radialGradient id="bobsheen" cx="35%" cy="30%" r="45%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <polygon fill="#233D4D" points="340,38 602,188 602,492 340,642 78,492 78,188"/>

  <g clip-path="url(#hexclip)">

    <circle fill="#EAECF0" cx="340" cy="185" r="7"/>

    <path fill="none" stroke="#7FB5C8" stroke-width="2"   stroke-linecap="round" opacity="0.20" d="M 192,355 A 168,168 0 0,1 488,355"/>
    <path fill="none" stroke="#7FB5C8" stroke-width="2"   stroke-linecap="round" opacity="0.33" d="M 205,344 A 150,150 0 0,1 475,344"/>
    <path fill="none" stroke="#7FB5C8" stroke-width="2.5" stroke-linecap="round" opacity="0.48" d="M 220,332 A 132,132 0 0,1 460,332"/>
    <path fill="none" stroke="#7FB5C8" stroke-width="2.5" stroke-linecap="round" opacity="0.63" d="M 238,320 A 113,113 0 0,1 442,320"/>
    <path fill="none" stroke="#7FB5C8" stroke-width="3"   stroke-linecap="round" opacity="0.82" d="M 258,306 A 94,94   0 0,1 422,306"/>

    <line stroke="#EAECF0" stroke-linecap="round" stroke-width="3.5" fill="none" x1="340" y1="185" x2="405" y2="325"/>

    <circle cx="408" cy="352" r="32" fill="url(#bobgrad)"/>
    <circle cx="408" cy="352" r="32" fill="url(#bobsheen)"/>
    <circle cx="408" cy="352" r="32" fill="none" stroke="#C45A0E" stroke-width="2.5" opacity="0.5"/>
    <circle cx="408" cy="352" r="22" fill="none" stroke="#FFB066" stroke-width="1.2" opacity="0.4"/>
    <circle cx="399" cy="328" r="5"  fill="#EAECF0" opacity="0.7"/>

  </g>

  <polygon fill="none" stroke="#FE7F2D" stroke-width="10" points="340,38 602,188 602,492 340,642 78,492 78,188"/>

  <text text-anchor="middle" x="340" y="525" font-family="'Fira Code', monospace" font-size="66" font-weight="700">
    <tspan fill="#EAECF0">sync</tspan><tspan fill="#FE7F2D">R</tspan>
  </text>

</svg>
