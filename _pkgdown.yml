url: https://syncr.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Colours (syncR palette) ───────────────────────────────────────────────
    # dark teal #233D4D | orange #FE7F2D | light #EAECF0 | blue #7FB5C8
    bg:              "#EAECF0"
    fg:              "#233D4D"
    primary:         "#FE7F2D"
    secondary:       "#7FB5C8"

    # ── Fonts ─────────────────────────────────────────────────────────────────
    base_font:       {google: "Inter"}
    heading_font:    {google: "Inter"}
    code_font:       {google: "Fira Code"}

    # ── Typography ────────────────────────────────────────────────────────────
    font-size-base:  "1rem"
    headings-font-weight: 700

    # ── Cards / surfaces ──────────────────────────────────────────────────────
    card-bg:         "#F5F6F8"
    card-border-color: "#D0D4DC"
    card-border-radius: "0.75rem"

    # ── Code blocks ───────────────────────────────────────────────────────────
    pre-bg:          "#233D4D"
    pre-color:       "#EAECF0"

  includes:
    in_header: |
      <meta property="og:image" content="https://syncr.circadia-lab.uk/logo.png">
      <meta property="og:image:width" content="1080">
      <meta property="og:image:height" content="1080">
      <meta property="og:image:type" content="image/png">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:image" content="https://syncr.circadia-lab.uk/logo.png">
      <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#FE7F2D">
      <meta name="msapplication-TileColor" content="#233D4D">
      <meta name="theme-color" content="#233D4D">
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #233D4D !important;
          border-bottom: 2px solid #FE7F2D;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #EAECF0 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #EAECF0 !important;
          border-bottom: 2px solid #FE7F2D;
        }

        /* ── Navbar logo size ── */
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Remove border under page title ── */
        .page-header { border-bottom: none !important; }

        /* ── Sidebar TOC links ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #233D4D !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #FE7F2D !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #FE7F2D !important;
          border-left: 2px solid #FE7F2D;
          font-weight: 600;
        }

        /* ── text-muted ── */
        .text-muted { color: #7FB5C8 !important; }

        /* ── Sidebar border ── */
        .sidebar { border-left: 3px solid #FE7F2D; padding-left: 1rem; }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #FE7F2D;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── Inline code ── */
        code {
          color: #C45A0E;
          background: #F0E8DC;
          border-radius: 4px;
          padding: 0.1em 0.35em;
        }

        /* ── Links ── */
        a { color: #C45A0E; }
        a:hover { color: #FE7F2D; }

        /* ── Footer ── */
        .footer { background: #233D4D; color: #EAECF0; padding: 1.5rem 0; }
        .footer a { color: #FE7F2D; }

        /* ── Search ── */
        #search-input { border-color: #FE7F2D; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #FE7F2D !important;
          border-color: #FE7F2D !important;
          color: #233D4D !important;
        }
        .btn-primary:hover {
          background-color: #C45A0E !important;
          border-color: #C45A0E !important;
        }
      </style>

logo: man/figures/logo.svg
favicon: pkgdown/favicon/favicon.svg

opengraph:
  image:
    src: https://syncr.circadia-lab.uk/logo.png
    alt: "syncR — Circadia Lab Data Integrator"
  twitter:
    creator: "@circadia_lab"
    card: summary

home:
  title: "syncR — Circadia Lab Data Integrator"
  description: >
    syncR::sync() — pulling everything into alignment, just like the SCN does.
    Integrates sleep diary, actigraphy, and questionnaire data across the
    Circadia Lab R ecosystem.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/syncR
      aria-label: GitHub

reference:
  - title: "Core"
    desc: "Primary integration function"
    contents:
      - sync
  - title: "Package"
    contents:
      - syncR-package

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - syncR

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **syncR** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
